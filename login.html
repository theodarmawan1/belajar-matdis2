<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login — MatDiskrit</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      --card-bg: rgba(30, 41, 59, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --accent-hover: #7c3aed;
      --input-bg: rgba(15, 23, 42, 0.6);
      --error-bg: rgba(239, 68, 68, 0.15);
      --error-border: rgba(239, 68, 68, 0.3);
      --error-text: #fca5a5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.4;
    }
    body::before {
      background: #4f46e5;
      top: -100px;
      left: -100px;
    }
    body::after {
      background: #c084fc;
      bottom: -100px;
      right: -100px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      z-index: 10;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      box-shadow: 0 8px 16px var(--accent-glow);
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(to right, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-align: center;
    }

    .form {
      width: 100%;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px var(--accent-glow);
      margin-top: 10px;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Error Message style */
    .error-container {
      width: 100%;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--error-text);
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .error-container svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="logo">∑</div>
      <h1 class="title">MatDiskrit</h1>
      <p class="subtitle">Silakan masuk untuk mengakses materi pembelajaran Matematika Diskrit</p>

      <div class="error-container" id="errorMsg">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <span id="errorText">Username atau password salah!</span>
      </div>

      <form class="form" action="/login-submit" method="POST">
        <div class="form-group">
          <label class="label" for="username">Username</label>
          <div class="input-wrapper">
            <input class="input" type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="label" for="password">Password</label>
          <div class="input-wrapper">
            <input class="input" type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
          </div>
        </div>

        <button class="btn" type="submit">Masuk</button>
      </form>
    </div>
  </div>

  <script>
    // Check for error in query string
    const urlParams = new URLSearchParams(window.location.search);
    const errorType = urlParams.get('error');
    if (errorType) {
      const errorMsgContainer = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      
      if (errorType === 'config') {
        errorText.innerText = 'Variabel AUTH_USER / AUTH_PASS belum diset di Vercel!';
      } else if (errorType === 'invalid') {
        errorText.innerText = 'Username atau password salah!';
      } else {
        errorText.innerText = 'Terjadi kesalahan sistem, silakan coba lagi.';
      }
      
      errorMsgContainer.style.display = 'flex';
    }
  </script>
</body>
</html>
